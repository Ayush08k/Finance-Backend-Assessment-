spring:
  application:
    name: finance-backend

  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# JWT Configuration
jwt:
  secret: "finance-backend-secret-key-must-be-at-least-256-bits-long-for-hs256-algo"
  expiration-ms: 86400000  # 24 hours

# Logging
logging:
  level:
    com.finance: DEBUG
    org.springframework.security: INFO

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
